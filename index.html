<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ENERCOS Catalog</title>
<style>
:root{--bg:#04070f;--panel:rgba(10,18,34,.6);--line:rgba(255,255,255,.16);--soft:rgba(255,255,255,.08);--text:#f7f8ff;--muted:#d7ddff;--glow:rgba(64,122,255,.18);--glow2:rgba(123,86,255,.22);--danger:#ffb1bf;--ok:#98ffd0}
*{box-sizing:border-box}html,body{margin:0;padding:0}body{font-family:Inter,Arial,sans-serif;color:var(--text);min-height:100vh;background:radial-gradient(900px 520px at 15% 12%, rgba(92,111,255,.14), transparent 54%),radial-gradient(760px 420px at 85% 24%, rgba(118,84,255,.16), transparent 46%),linear-gradient(180deg,#02040a 0%, #050913 100%);overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;opacity:.32;background:radial-gradient(circle at 20% 20%, rgba(255,255,255,.07) 0 1px, transparent 1.5px),radial-gradient(circle at 70% 35%, rgba(120,130,255,.10) 0 1px, transparent 1.5px),radial-gradient(circle at 30% 70%, rgba(255,255,255,.05) 0 1px, transparent 1.5px);background-size:42px 42px,72px 72px,90px 90px}
.container{width:min(1320px,calc(100% - 28px));margin:0 auto}
.topbar{position:sticky;top:0;z-index:50;background:rgba(3,6,12,.72);backdrop-filter:blur(14px);border-bottom:1px solid var(--soft)}
.topbar-inner{height:72px;display:flex;align-items:center;justify-content:space-between}
.brand{font-size:24px;font-weight:900;letter-spacing:.18em}
.glass{border:1px solid var(--line);background:rgba(255,255,255,.05);backdrop-filter:blur(14px);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 26px rgba(0,0,0,.22),0 0 28px var(--glow);transition:.18s}
.glass:hover{transform:translateY(-1px);background:rgba(255,255,255,.08)}
.btn{height:46px;border-radius:14px;padding:0 14px;display:inline-flex;gap:10px;align-items:center;cursor:pointer;font-weight:800}
.iconbtn{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;cursor:pointer}
.badge{min-width:22px;height:22px;border-radius:999px;padding:0 6px;display:grid;place-items:center;background:#fff;color:#11183a;font-size:12px;font-weight:900}
.hero{margin-top:18px;min-height:220px;border-radius:28px;border:1px solid var(--soft);background:radial-gradient(420px 180px at 30% 20%, rgba(78,116,255,.14), transparent 60%),radial-gradient(380px 180px at 72% 68%, rgba(129,89,255,.18), transparent 58%),rgba(8,14,28,.56);backdrop-filter:blur(14px);box-shadow:inset 0 1px 0 rgba(255,255,255,.04),0 18px 48px rgba(0,0,0,.28),0 0 36px rgba(71,104,255,.10);display:flex;align-items:center;justify-content:center;text-align:center;padding:34px 18px}
.hero h1{margin:0;font-size:clamp(34px,6vw,70px);letter-spacing:.16em}
.hero-btn{margin-top:18px;min-width:160px;height:52px;border-radius:14px;text-transform:uppercase;letter-spacing:.12em}
.toolbar{margin:22px 0 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.tabs{display:flex;flex-wrap:wrap;gap:10px}
.tab{height:44px;padding:0 16px;border-radius:14px;cursor:pointer;font-weight:800;letter-spacing:.05em}
.tab.active{background:rgba(255,255,255,.10);box-shadow:0 0 0 1px rgba(255,255,255,.12),0 0 28px var(--glow2)}
.search{position:relative;min-width:min(100%,320px);flex:1 1 280px;max-width:320px}
.search input{width:100%;height:46px;border-radius:14px;padding:0 14px 0 40px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:#fff;outline:none}
.search svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.75}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px;padding-bottom:120px}
.card{border-radius:24px;overflow:hidden;border:1px solid var(--soft);background:linear-gradient(180deg, rgba(11,17,31,.76), rgba(8,13,24,.64));backdrop-filter:blur(16px);box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 14px 34px rgba(0,0,0,.26),0 0 28px rgba(71,104,255,.10);display:flex;flex-direction:column;transition:.18s}
.card:hover{transform:translateY(-3px)}
.card.selected{box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 16px 38px rgba(0,0,0,.30),0 0 36px rgba(115,94,255,.18)}
.media{position:relative;aspect-ratio:1/1;background:#101728;overflow:hidden}
.media img{width:100%;height:100%;object-fit:cover;display:block}
.placeholder{position:absolute;inset:0;display:grid;place-items:center;color:#bfc8ff}
.label,.mark{position:absolute;top:12px;border:1px solid rgba(255,255,255,.16);background:rgba(6,10,20,.42);backdrop-filter:blur(10px);z-index:2}
.label{left:12px;border-radius:12px;padding:7px 10px;font-size:11px;font-weight:800;letter-spacing:.08em}
.mark{right:12px;width:34px;height:34px;border-radius:12px;display:grid;place-items:center}
.body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
.title{margin:0;font-size:22px;line-height:1.08;font-weight:900}
.meta{color:var(--muted);font-size:14px;line-height:1.5;min-height:84px}
.priceRow{margin-top:auto;display:flex;align-items:center;justify-content:space-between}
.price{font-size:28px;font-weight:900}
.add{width:46px;height:46px;border-radius:14px;display:grid;place-items:center;cursor:pointer}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.56);backdrop-filter:blur(4px);opacity:0;visibility:hidden;transition:.2s;z-index:70}
.backdrop.show{opacity:1;visibility:visible}
.side,.admin{position:fixed;top:0;bottom:0;right:0;transform:translateX(100%);transition:.24s;background:rgba(6,10,18,.94);backdrop-filter:blur(18px);border-left:1px solid var(--soft);box-shadow:-20px 0 60px rgba(0,0,0,.34);display:flex;flex-direction:column}
.side{width:min(430px,100%);z-index:80}.admin{width:min(760px,100%);z-index:81}
.side.open,.admin.open{transform:translateX(0)}
.head{padding:18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--soft)}
.head h2{margin:0;font-size:24px}
.items,.adminbody{padding:16px;display:flex;flex-direction:column;gap:12px;overflow:auto;flex:1}
.empty{display:grid;place-items:center;text-align:center;color:var(--muted);flex:1}
.item{display:grid;grid-template-columns:82px 1fr;gap:12px;padding:12px;border-radius:20px;border:1px solid var(--soft);background:rgba(255,255,255,.04)}
.item img{width:82px;height:82px;object-fit:cover;border-radius:14px}
.item h4{margin:0 0 4px;font-size:16px}
.small{font-size:12px;color:var(--muted)}
.controls{margin-top:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.qty{display:flex;align-items:center;gap:8px;padding:4px;border-radius:999px;border:1px solid var(--soft);background:rgba(255,255,255,.03)}
.qty button{width:30px;height:30px;border:none;border-radius:999px;cursor:pointer;color:#fff;background:transparent}
.qty button:hover{background:rgba(255,255,255,.08)}
.remove{border:none;background:none;color:var(--danger);cursor:pointer;font-weight:800}
.foot{padding:16px;border-top:1px solid var(--soft);background:rgba(6,10,18,.92)}
.summary{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;color:var(--muted)}
.summary strong{font-size:28px;color:#fff}
.checkout{width:100%;height:52px;border-radius:14px;cursor:pointer;font-weight:900}
.modal{position:fixed;inset:0;z-index:95;display:grid;place-items:center;padding:18px;opacity:0;visibility:hidden;transition:.22s;background:rgba(0,0,0,.58);backdrop-filter:blur(5px)}
.modal.show{opacity:1;visibility:visible}
.modalcard{width:min(720px,100%);max-height:min(92vh,900px);overflow:auto;border-radius:24px;border:1px solid var(--soft);background:rgba(9,14,26,.88);backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.42);transform:translateY(8px) scale(.985);transition:.22s}
.modal.show .modalcard{transform:translateY(0) scale(1)}
.formwrap,.adminwrap{padding:18px}
.pills{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.pill{padding:9px 12px;border-radius:14px;font-size:12px;font-weight:800;border:1px solid var(--soft);background:rgba(255,255,255,.04)}
.formgrid,.admingrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:8px}.field.full{grid-column:1/-1}
.field label{font-size:13px;font-weight:700}
.field input,.field textarea,.field select{width:100%;border-radius:14px;border:1px solid var(--line);background:rgba(255,255,255,.04);color:#fff;outline:none;padding:14px}
.field textarea{resize:vertical;min-height:86px}
.options{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.choice{padding:14px;border-radius:18px;cursor:pointer;border:1px solid var(--soft);background:rgba(255,255,255,.04);display:flex;align-items:flex-start;gap:10px}
.choice.active{border-color:rgba(255,255,255,.22);background:rgba(255,255,255,.08)}
.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:18px;flex-wrap:wrap}
.success{position:fixed;inset:0;z-index:110;display:grid;place-items:center;opacity:0;visibility:hidden;transition:.3s;background:radial-gradient(540px 240px at 50% 45%, rgba(86,110,255,.18), transparent 60%), rgba(3,5,12,.82);backdrop-filter:blur(8px)}
.success.show{opacity:1;visibility:visible}
.successcard{width:min(520px, calc(100% - 28px));border-radius:24px;border:1px solid var(--soft);background:rgba(9,14,26,.90);backdrop-filter:blur(18px);box-shadow:0 24px 70px rgba(0,0,0,.45);padding:34px 24px;text-align:center}
.energy{width:116px;height:116px;margin:0 auto 20px;position:relative;display:grid;place-items:center}
.ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg, rgba(83,112,255,.96), rgba(142,103,255,.96), rgba(84,132,255,.96), rgba(83,112,255,.96));animation:spin 2.2s linear infinite;-webkit-mask:radial-gradient(circle, transparent 60%, #000 62%);mask:radial-gradient(circle, transparent 60%, #000 62%)}
.core{position:absolute;inset:12px;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 50% 55%, rgba(110,85,255,.18), transparent 48%), rgba(255,255,255,.03)}
.fill{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(180deg, rgba(160,140,255,.12), rgba(112,98,255,.55) 44%, rgba(72,114,255,.84));animation:fillUp 2.7s ease forwards}
.flame{width:30px;height:48px;position:relative;z-index:2;border-radius:60% 60% 68% 68% / 72% 72% 34% 34%;background:linear-gradient(180deg, #d7c8ff 0%, #9b78ff 35%, #5a6dff 100%);clip-path:path('M15 0 C25 10 30 18 30 28 C30 40 22 48 15 48 C8 48 0 40 0 28 C0 18 6 10 15 0 Z');filter:drop-shadow(0 0 14px rgba(120,104,255,.58));animation:pulse 1.1s ease-in-out infinite alternate}
.spark{position:absolute;inset:0;border-radius:50%;pointer-events:none;animation:flash 3.1s ease forwards}
.success h4{margin:0 0 10px;font-size:32px}.success p{margin:0 auto 20px;max-width:400px;line-height:1.6}
.adminToggle{position:fixed;left:10px;bottom:10px;z-index:35;opacity:.08;transform:scale(.82)}
.adminToggle:hover{opacity:.22}
.loginbox{display:grid;gap:12px;border:1px solid var(--soft);border-radius:18px;padding:14px;background:rgba(255,255,255,.03)}
.status{font-size:12px;color:var(--muted)} .ok{color:var(--ok)} .danger{color:var(--danger)}
.preview{width:100%;height:120px;border-radius:14px;object-fit:cover;border:1px solid var(--soft);background:#101728}
.hidden{display:none!important}
@keyframes spin{to{transform:rotate(360deg)}}@keyframes fillUp{0%{height:0%}60%{height:64%}85%{height:92%}100%{height:100%}}@keyframes flash{0%,78%{box-shadow:0 0 0 rgba(255,255,255,0);opacity:0}90%{box-shadow:0 0 0 8px rgba(205,220,255,.18),0 0 28px 12px rgba(160,120,255,.24);opacity:1}100%{box-shadow:0 0 0 18px rgba(205,220,255,0),0 0 40px 20px rgba(160,120,255,0);opacity:0}}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.08)}}
@media (max-width:1120px){.grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media (max-width:860px){.admingrid{grid-template-columns:1fr}}@media (max-width:760px){.grid,.formgrid,.admingrid,.options{grid-template-columns:1fr}.search{max-width:none}.brand{font-size:20px}.hero{min-height:250px}}
</style>
</head>

, {"id": "ch2", "line": "ENERCHOCO", "name": "Dark Chili", "description": "Rich dark chocolate with a bold chili kick. Strong contrast of sweetness and spice.", "price": 5.2, "img": "https://drive.google.com/uc?export=view&id=18GQeOnzMI3Attyl46_m6N6YvNA1evdg4"}, {"id": "ch3", "line": "ENERCHOCO", "name": "Pistachio Honey", "description": "Creamy pistachio filling blended with natural honey. Smooth, nutty, warm sweetness.", "price": 5.5, "img": "https://drive.google.com/uc?export=view&id=1VYv8ugFZwUjWittW9fQH1qJU8gXHloz4"}, {"id": "ch4", "line": "ENERCHOCO", "name": "Rose Raspberry", "description": "Elegant mix of raspberry freshness and delicate rose notes. Light, floral, refined.", "price": 5.4, "img": "https://drive.google.com/uc?export=view&id=1oVJk9fdZ_tc0TZyjthyk4R9O9R3NGnpk"}, {"id": "ch5", "line": "ENERCHOCO", "name": "Coffee Energy", "description": "Deep coffee flavor with smooth chocolate base. Balanced bitterness and sweetness for energy.", "price": 5.3, "img": "https://drive.google.com/uc?export=view&id=1Zajft5aVBG4By3hggBA4qFpXlhNSr3iC"}, {"id": "ch6", "line": "ENERCHOCO", "name": "Matcha Orange", "description": "Exotic blend of matcha and juicy orange. Fresh, slightly bitter, citrus-bright.", "price": 5.2, "img": "https://drive.google.com/uc?export=view&id=1d8P-gnIZRCylzbPXAa5Ca3UwQte8q_DO"}, {"id": "el1", "line": "ENERLINE", "name": "Flame Elixir", "description": "Deep chocolate with cool mint and a light spicy kick.", "price": 3.99, "img": "https://drive.google.com/uc?export=view&id=110K3IE4yfmzBH756rRKiwW6J0hMukEfE"}, {"id": "el2", "line": "ENERLINE", "name": "Ice Core", "description": "Smooth, fresh taste with a cooling effect.", "price": 3.99, "img": "https://drive.google.com/uc?export=view&id=1jaBlgb5mhAcL4Nddu29CNB1kkUvipY4k"}, {"id": "el3", "line": "ENERLINE", "name": "Dark Pulse", "description": "Rich flavor with a strong energy boost.", "price": 4.49, "img": "https://drive.google.com/uc?export=view&id=1C8FaFfnx05JRmBEpIzKgAUpo4IqXF5wH"}, {"id": "el4", "line": "ENERLINE", "name": "Green Energy", "description": "Fresh green taste with a light citrus touch.", "price": 3.99, "img": "https://drive.google.com/uc?export=view&id=1PxTYkyNGM3H36cdtjjoAv3gxE4ZAvU8F"}, {"id": "el5", "line": "ENERLINE", "name": "Void Edition", "description": "Deep, dark, and unique flavor.", "price": 4.49, "img": "https://drive.google.com/uc?export=view&id=1UZbmFdibJsQHbXDCJ5O-LGRMdBN_fHPT"}, {"id": "el6", "line": "ENERLINE", "name": "Solar Infusion", "description": "Bright citrus with a light spicy kick.", "price": 4.29, "img": "https://drive.google.com/uc?export=view&id=1iqqRF9HZqvbI5PPUXbdohg8-77C892IU"}, {"id": "ed1", "line": "ENERDUO", "name": "Purple Night Energy", "description": "Blueberry, grape, desserts, sauces, 2 drinks.", "price": 18.9, "img": "https://drive.google.com/uc?export=view&id=1wCCRjXfuQ41KHN-LzsDZHHCSMy4KXJel"}, {"id": "ed2", "line": "ENERDUO", "name": "Strawberry Kiss Duo", "description": "Strawberry, cream, desserts, sauces, 2 drinks.", "price": 17.9, "img": "https://drive.google.com/uc?export=view&id=12fOj-YEkpm12DCla5wbihi2h2k-ox3dv"}, {"id": "ed3", "line": "ENERDUO", "name": "Tropical Fusion Heat", "description": "Mango, pineapple, coconut, desserts, sauces, 2 drinks.", "price": 18.5, "img": "https://drive.google.com/uc?export=view&id=1apS_vLbyXLsVLTiSVZf9dvmiiGrsS5hM"}, {"id": "ed4", "line": "ENERDUO", "name": "Choco Overdose Duo", "description": "Chocolate, brownies, creams, sauces, 2 drinks.", "price": 19.9, "img": "https://drive.google.com/uc?export=view&id=1ypKgTV8f6PESZ0OltoKU-AYKRrRf9Pcz"}, {"id": "ed5", "line": "ENERDUO", "name": "Fresh Balance Duo", "description": "Apple, lemon, fruits, desserts, 2 drinks.", "price": 17.5, "img": "https://drive.google.com/uc?export=view&id=1V25uWljm2XoQK2C7IUG1H1snSkkonrPU"}, {"id": "ed6", "line": "ENERDUO", "name": "Fire Ice Duo", "description": "Citrus, caramel, desserts, sauces, 2 drinks.", "price": 19.5, "img": "https://drive.google.com/uc?export=view&id=1qjj2yPa20wJQP8jTnCyxZf2gvk6Rz4PM"}];

function cloneProducts(arr){ return JSON.parse(JSON.stringify(arr)); }
function loadConfig(){ try{ const raw=localStorage.getItem(CONFIG_KEY); if(!raw) return cloneProducts(INITIAL_PRODUCTS); const parsed=JSON.parse(raw); return Array.isArray(parsed)?parsed:cloneProducts(INITIAL_PRODUCTS);}catch(e){ return cloneProducts(INITIAL_PRODUCTS);} }
function saveConfig(){ localStorage.setItem(CONFIG_KEY, JSON.stringify(state.products)); }
function driveToDirect(url){ if(!url) return ""; const m=String(url).match(/\/d\/([^/]+)/); if(m) return `https://drive.google.com/uc?export=view&id=${m[1]}`; return String(url).trim(); }

const tabs = ["ALL","ENERLINE","ENERCHIC","ENERCHOCO","ENERDUO"];
const state = { activeTab:"ALL", search:"", cart:{}, products:loadConfig(), adminUnlocked:false, selectedAdminId:"ec1" };
const $ = id => document.getElementById(id);

function getProduct(id){ return state.products.find(p => p.id===id); }
function escapeHtml(s){ return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])); }
function iconPlus(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'; }
function iconMinus(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>'; }
function iconCheck(){ return '<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="m5 12 4.2 4.2L19 6.5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }
function iconImage(){ return '<svg width="26" height="26" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="16" rx="2" stroke="currentColor" stroke-width="1.8"/><circle cx="9" cy="10" r="1.5" fill="currentColor"/><path d="m21 16-5.2-5.2a1.2 1.2 0 0 0-1.7 0L8 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'; }

function makeTabs(){
  const tabsEl=$("tabs"); tabsEl.innerHTML="";
  tabs.forEach(tab=>{
    const btn=document.createElement("button");
    btn.className="glass btn tab"+(tab===state.activeTab?" active":"");
    btn.textContent=tab;
    btn.onclick=()=>{ state.activeTab=tab; makeTabs(); renderGrid(); };
    tabsEl.appendChild(btn);
  });
}
function filteredProducts(){
  const q=state.search.trim().toLowerCase();
  return state.products.filter(p=>{
    const byTab=state.activeTab==="ALL" || p.line===state.activeTab;
    const bySearch=!q || [p.name,p.description,p.line].join(" ").toLowerCase().includes(q);
    return byTab && bySearch;
  });
}
function inCart(id){ return !!state.cart[id]; }
function addToCart(id){ state.cart[id]=(state.cart[id]||0)+1; sync(); openCart(); }
function toggleSelected(id){ if(state.cart[id]) delete state.cart[id]; else state.cart[id]=1; sync(); }
function changeQty(id,delta){ const next=(state.cart[id]||0)+delta; if(next<=0) delete state.cart[id]; else state.cart[id]=next; sync(); }
function cartEntries(){ return Object.entries(state.cart).map(([id,qty])=>({product:getProduct(id),qty,sum:getProduct(id).price*qty})); }
function cartCount(){ return cartEntries().reduce((s,x)=>s+x.qty,0); }
function cartTotal(){ return cartEntries().reduce((s,x)=>s+x.sum,0); }

function renderGrid(){
  const grid=$("grid"); const list=filteredProducts(); grid.innerHTML="";
  if(!list.length){ grid.innerHTML='<div class="card" style="padding:28px;text-align:center;color:var(--muted)">No results</div>'; return; }
  list.forEach(p=>{
    const selected=inCart(p.id);
    const card=document.createElement("article");
    card.className="card"+(selected?" selected":"");
    card.innerHTML='<div class="media">'+(p.img?'<img src="'+escapeHtml(p.img)+'" alt="'+escapeHtml(p.name)+'">':'<div class="placeholder">'+iconImage()+'</div>')+'<div class="label">'+p.line+'</div><div class="mark">'+(selected?iconCheck():iconPlus())+'</div></div><div class="body"><h3 class="title">'+escapeHtml(p.name)+'</h3><div class="meta">'+escapeHtml(p.description)+'</div><div class="priceRow"><div class="price">$'+Number(p.price).toFixed(2)+'</div><button class="glass iconbtn add">'+(selected?iconCheck():iconPlus())+'</button></div></div>';
    card.querySelector(".add").onclick=(e)=>{ e.stopPropagation(); addToCart(p.id); };
    card.onclick=()=>toggleSelected(p.id);
    grid.appendChild(card);
  });
}
function renderCart(){
  const entries=cartEntries();
  $("cartBadge").textContent=cartCount();
  $("cartTotal").textContent=cartTotal().toFixed(2);
  $("modalItemsCount").textContent=cartCount();
  $("modalOrderTotal").textContent=cartTotal().toFixed(2);
  const cartItems=$("cartItems");
  if(!entries.length){
    cartItems.innerHTML='<div class="empty"><div><div style="font-size:38px;margin-bottom:10px;">🛒</div><div>Empty</div></div></div>';
    $("checkoutBtn").disabled=true; $("checkoutBtn").style.opacity=".5"; return;
  }
  $("checkoutBtn").disabled=false; $("checkoutBtn").style.opacity="1";
  cartItems.innerHTML=entries.map(({product,qty,sum})=>'<div class="item">'+(product.img?'<img src="'+escapeHtml(product.img)+'" alt="'+escapeHtml(product.name)+'">':'<div style="width:82px;height:82px;border-radius:14px;border:1px dashed rgba(255,255,255,.20);display:grid;place-items:center;color:#fff;background:rgba(255,255,255,.03)">'+iconImage()+'</div>')+'<div><h4>'+escapeHtml(product.name)+'</h4><div class="small">'+product.line+' · $'+Number(product.price).toFixed(2)+'</div><div class="controls"><div class="qty"><button type="button" data-action="minus" data-id="'+product.id+'">'+iconMinus()+'</button><strong>'+qty+'</strong><button type="button" data-action="plus" data-id="'+product.id+'">'+iconPlus()+'</button></div><div style="display:flex;align-items:center;gap:10px;"><strong>$'+sum.toFixed(2)+'</strong><button class="remove" type="button" data-action="remove" data-id="'+product.id+'">Remove</button></div></div></div></div>').join("");
  cartItems.querySelectorAll("[data-action]").forEach(btn=>btn.onclick=()=>{ const id=btn.dataset.id, act=btn.dataset.action; if(act==="minus") changeQty(id,-1); if(act==="plus") changeQty(id,1); if(act==="remove"){ delete state.cart[id]; sync(); } });
}

function renderAdminSelect(){
  $("adminProduct").innerHTML=state.products.map(p=>'<option value="'+p.id+'">'+p.line+' — '+escapeHtml(p.name)+'</option>').join('');
  $("adminProduct").value=state.selectedAdminId; fillAdminForm();
}
function fillAdminForm(){
  const p=getProduct(state.selectedAdminId); if(!p) return;
  $("adminName").value=p.name||""; $("adminPrice").value=p.price??""; $("adminImageUrl").value=p.img||""; $("adminDescription").value=p.description||"";
  const prev=$("adminPreview");
  if(p.img){ prev.src=p.img; prev.style.display="block"; } else { prev.removeAttribute("src"); prev.style.display="none"; }
}
function setAdminStatus(msg,kind){ $("adminStatus").className="status "+(kind||""); $("adminStatus").textContent=msg; }
function saveCurrentAdminItem(){
  const p=getProduct(state.selectedAdminId); if(!p) return;
  p.name=$("adminName").value.trim();
  p.price=parseFloat($("adminPrice").value||"0")||0;
  p.img=driveToDirect($("adminImageUrl").value.trim());
  p.description=$("adminDescription").value.trim();
  saveConfig(); fillAdminForm(); sync(); renderAdminSelect(); setAdminStatus("Saved.","ok");
}
function exportConfig(){
  const blob=new Blob([JSON.stringify(state.products,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download="enercos-config.json"; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url); setAdminStatus("Config exported.","ok");
}
function resetAll(){
  if(!confirm("Reset all admin changes?")) return;
  state.products=cloneProducts(INITIAL_PRODUCTS); saveConfig(); renderAdminSelect(); sync(); setAdminStatus("All changes reset.","danger");
}
function sync(){ renderGrid(); renderCart(); }
function openCart(){ $("cartPanel").classList.add("open"); $("backdrop").classList.add("show"); }
function closeCart(){ $("cartPanel").classList.remove("open"); if(!$("adminPanel").classList.contains("open") && !$("checkoutModal").classList.contains("show")) $("backdrop").classList.remove("show"); }
function openAdmin(){ $("adminPanel").classList.add("open"); $("backdrop").classList.add("show"); }
function closeAdmin(){ $("adminPanel").classList.remove("open"); if(!$("cartPanel").classList.contains("open") && !$("checkoutModal").classList.contains("show")) $("backdrop").classList.remove("show"); }
function openModal(){ if(!cartCount()) return; $("checkoutModal").classList.add("show"); $("backdrop").classList.add("show"); }
function closeModal(){ $("checkoutModal").classList.remove("show"); if(!$("cartPanel").classList.contains("open") && !$("adminPanel").classList.contains("open")) $("backdrop").classList.remove("show"); }

function setChoiceGroups(){
  document.querySelectorAll(".options").forEach(group=>{
    const labels=group.querySelectorAll(".choice");
    const refresh=()=>labels.forEach(l=>l.classList.toggle("active", l.querySelector("input").checked));
    labels.forEach(label=>{
      label.addEventListener("click", ()=>{ label.querySelector("input").checked=true; refresh(); updateAddressVisibility(); });
      label.querySelector("input").addEventListener("change", ()=>{ refresh(); updateAddressVisibility(); });
    });
    refresh();
  });
}
function updateAddressVisibility(){
  const courier=document.querySelector('input[name="deliveryType"]:checked')?.value==="courier";
  $("addressField").style.display=courier?"flex":"none";
  $("address").required=courier;
}

$("openCartBtn").onclick=openCart; $("closeCartBtn").onclick=closeCart; $("openAdminBtn").onclick=openAdmin; $("closeAdminBtn").onclick=closeAdmin;
$("backdrop").onclick=()=>{ closeCart(); closeAdmin(); closeModal(); };
$("checkoutBtn").onclick=()=>{ closeCart(); openModal(); };
$("closeModalBtn").onclick=closeModal;
$("backToCartBtn").onclick=()=>{ closeModal(); openCart(); };
$("successDoneBtn").onclick=()=>$("successScreen").classList.remove("show");
$("searchInput").addEventListener("input", e=>{ state.search=e.target.value; renderGrid(); });
$("scrollToCatalog").onclick=()=>{ $("catalogSection").scrollIntoView({behavior:"smooth", block:"start"}); };

$("loginAdminBtn").onclick=()=>{ if($("adminPin").value===ADMIN_PIN){ state.adminUnlocked=true; $("adminLogin").classList.add("hidden"); $("adminEditor").classList.remove("hidden"); renderAdminSelect(); setAdminStatus("Admin unlocked.","ok"); } else { setAdminStatus("Wrong PIN.","danger"); } };
$("adminPin").addEventListener("keydown", e=>{ if(e.key==="Enter") $("loginAdminBtn").click(); });
$("adminProduct").onchange=()=>{ state.selectedAdminId=$("adminProduct").value; fillAdminForm(); setAdminStatus("Item loaded."); };
$("saveProductBtn").onclick=saveCurrentAdminItem;
$("clearImageBtn").onclick=()=>{ $("adminImageUrl").value=""; saveCurrentAdminItem(); };
$("exportConfigBtn").onclick=exportConfig;
$("resetAllBtn").onclick=resetAll;

$("checkoutForm").addEventListener("submit", e=>{
  e.preventDefault();
  closeModal(); state.cart={}; sync(); $("checkoutForm").reset(); updateAddressVisibility(); setChoiceGroups();
  const fill=document.querySelector(".fill"), spark=document.querySelector(".spark");
  fill.style.animation="none"; spark.style.animation="none"; void fill.offsetWidth;
  fill.style.animation="fillUp 2.7s ease forwards"; spark.style.animation="flash 3.1s ease forwards";
  $("successScreen").classList.add("show");
});

makeTabs(); setChoiceGroups(); updateAddressVisibility(); sync();
</script>
</body>
</html>
