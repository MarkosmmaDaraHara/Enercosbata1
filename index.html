```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ENERCOS | Premium Catalog</title>
    <style>
        /* ==========================================================================
           VARIABLES & RESET
           ========================================================================== */
        :root {
            --bg-color: #03030a;
            --surface: rgba(20, 20, 40, 0.4);
            --surface-hover: rgba(30, 30, 60, 0.6);
            --primary: #5d24d6;
            --primary-glow: #8e54ff;
            --secondary: #00d2ff;
            --text-main: #ffffff;
            --text-muted: #a0a0b8;
            --border: rgba(255, 255, 255, 0.1);
            --border-glow: rgba(142, 84, 255, 0.3);
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(93, 36, 214, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 50%);
            background-attachment: fixed;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--surface-hover); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        button {
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input, textarea, select {
            font-family: inherit;
            outline: none;
        }

        .glass {
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
        }

        /* ==========================================================================
           TYPOGRAPHY & UTILITIES
           ========================================================================== */
        .gradient-text {
            background: linear-gradient(90deg, var(--primary-glow), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* ==========================================================================
           TOP BAR
           ========================================================================== */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 15px;
            transition: border-color 0.3s;
        }

        .search-container:focus-within {
            border-color: var(--primary-glow);
        }

        .search-container input {
            background: transparent;
            border: none;
            color: var(--text-main);
            width: 150px;
            font-size: 0.9rem;
            transition: width 0.3s;
        }
        
        @media (max-width: 600px) {
            .search-container input { width: 100px; }
        }

        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid transparent;
        }

        .icon-btn:hover {
            background: var(--surface-hover);
            border-color: var(--border);
        }

        .cart-btn {
            position: relative;
        }

        .cart-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: var(--primary-glow);
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ==========================================================================
           HERO SECTION
           ========================================================================== */
        .hero {
            padding: 150px 5% 80px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-glow));
            color: white;
            padding: 12px 32px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(93, 36, 214, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(142, 84, 255, 0.6);
        }

        /* ==========================================================================
           FILTERS
           ========================================================================== */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            padding: 0 5% 40px;
        }

        .filter-btn {
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .filter-btn:hover {
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary-glow);
            box-shadow: 0 0 10px rgba(142, 84, 255, 0.3);
        }

        /* ==========================================================================
           PRODUCT GRID
           ========================================================================== */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5% 80px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }

        @media (max-width: 900px) {
            .product-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 600px) {
            .product-grid { grid-template-columns: 1fr; }
        }

        .product-card {
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--border-glow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: left 0.7s ease;
        }

        .product-card:hover::before {
            left: 150%;
        }

        .product-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 15px;
            background: rgba(0,0,0,0.5);
        }

        .product-line {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--secondary);
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .product-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 20px;
            flex-grow: 1;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.4;
        }

        .product-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .product-price {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .btn-add {
            background: var(--surface-hover);
            border: 1px solid var(--border);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .btn-add:hover {
            background: var(--primary);
            border-color: var(--primary-glow);
        }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* ==========================================================================
           CART PANEL
           ========================================================================== */
        .cart-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 200;
        }

        .cart-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .cart-panel {
            position: fixed;
            top: 0; right: 0;
            width: 100%;
            max-width: 400px;
            height: 100vh;
            background: var(--bg-color);
            border-left: 1px solid var(--border);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            transform: translateX(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 201;
            display: flex;
            flex-direction: column;
        }

        .cart-overlay.open .cart-panel {
            transform: translateX(0);
        }

        .cart-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-header h2 {
            font-size: 1.2rem;
        }

        .cart-items {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: var(--surface);
            padding: 10px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .cart-item-img {
            width: 60px;
            height: 60px;
            border-radius: 4px;
            object-fit: cover;
        }

        .cart-item-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .cart-item-title {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 2px;
        }
        
        .cart-item-line {
            font-size: 0.7rem;
            color: var(--secondary);
        }

        .cart-item-price {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .cart-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 5px;
        }

        .qty-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover { background: var(--primary); }

        .qty-count {
            font-size: 0.9rem;
            width: 20px;
            text-align: center;
        }

        .btn-remove {
            color: #ff4d4d;
            background: rgba(255, 77, 77, 0.1);
            padding: 5px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: auto;
        }

        .btn-remove:hover { background: rgba(255, 77, 77, 0.2); }

        .cart-footer {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--surface-hover);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            text-align: center;
            display: block;
        }

        .empty-cart-msg {
            text-align: center;
            color: var(--text-muted);
            margin-top: 50px;
        }

        /* ==========================================================================
           MODALS (Checkout & Success)
           ========================================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 300;
            padding: 20px;
        }

        .modal-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.3s;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.open .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            color: white;
            padding: 10px 15px;
            border-radius: var(--radius-sm);
            transition: border-color 0.3s;
        }

        .form-control:focus {
            border-color: var(--primary-glow);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group { flex: 1; }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            flex: 1;
            text-align: center;
        }
        .btn-outline:hover { background: var(--surface-hover); }

        .btn-submit {
            flex: 2;
            border: none;
        }

        /* Success Animation */
        .success-content {
            text-align: center;
            padding: 20px 10px;
        }

        .flame-container {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flame {
            width: 50px;
            height: 50px;
            background: linear-gradient(-45deg, var(--primary), var(--secondary));
            border-radius: 50% 50% 0 50%;
            transform: rotate(45deg);
            animation: pulseFlame 1.5s infinite alternate;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        @keyframes pulseFlame {
            0% { transform: rotate(45deg) scale(0.9); box-shadow: 0 0 15px var(--primary-glow); }
            100% { transform: rotate(45deg) scale(1.1); box-shadow: 0 0 40px var(--secondary); }
        }

        .success-msg {
            font-size: 1.1rem;
            line-height: 1.5;
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .success-msg h3 {
            color: white;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        /* ==========================================================================
           ADMIN PANEL
           ========================================================================== */
        .admin-trigger {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 30px;
            height: 30px;
            opacity: 0.1;
            z-index: 10;
            border-radius: 50%;
        }
        .admin-trigger:hover { opacity: 0.5; }

        .admin-modal {
            max-width: 900px;
        }

        .admin-table-wrapper {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .admin-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .admin-item {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: var(--radius-sm);
            display: grid;
            grid-template-columns: 60px 1fr;
            gap: 15px;
        }

        .admin-img-preview {
            width: 60px; height: 60px;
            object-fit: cover;
            border-radius: 4px;
            background: #111;
        }

        .admin-fields {
            display: grid;
            grid-template-columns: 1fr 1fr 100px;
            gap: 10px;
        }

        .admin-fields input, .admin-fields textarea {
            width: 100%;
            background: var(--bg-color);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .admin-fields textarea {
            grid-column: 1 / -1;
            height: 40px;
            resize: none;
        }

        .admin-controls {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        @media (max-width: 700px) {
            .admin-fields { grid-template-columns: 1fr; }
        }

        /* Utilities */
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <header class="glass">
        <div class="logo gradient-text">ENERCOS</div>
        <div class="header-actions">
            <div class="search-container">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 8px;">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search...">
            </div>
            <button class="icon-btn cart-btn" id="openCartBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"></circle>
                    <circle cx="20" cy="21" r="1"></circle>
                    <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                </svg>
                <span class="cart-badge" id="cartBadge">0</span>
            </button>
        </div>
    </header>

    <!-- HERO SECTION -->
    <section class="hero">
        <h1 class="gradient-text">ENERCOS</h1>
        <button class="btn-primary" onclick="document.getElementById('catalog').scrollIntoView({behavior: 'smooth'})">Order</button>
    </section>

    <!-- FILTER BAR -->
    <div class="filters" id="filterContainer">
        <button class="filter-btn active" data-filter="ALL">ALL</button>
        <button class="filter-btn" data-filter="ENERLINE">ENERLINE</button>
        <button class="filter-btn" data-filter="ENERCHIC">ENERCHIC</button>
        <button class="filter-btn" data-filter="ENERCHOCO">ENERCHOCO</button>
        <button class="filter-btn" data-filter="ENERDUO">ENERDUO</button>
    </div>

    <!-- PRODUCT GRID -->
    <main class="container" id="catalog">
        <div class="product-grid" id="productGrid">
            <!-- Products injected by JS -->
        </div>
    </main>

    <!-- CART PANEL -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-panel glass">
            <div class="cart-header">
                <h2>Your Orbit</h2>
                <button class="icon-btn" id="closeCartBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="cart-items" id="cartItemsContainer">
                <!-- Cart items injected by JS -->
            </div>
            <div class="cart-footer">
                <div class="cart-total">
                    <span>Total:</span>
                    <span id="cartTotalPrice">$ 0.00</span>
                </div>
                <button class="btn-primary btn-checkout" id="checkoutBtn">Checkout</button>
            </div>
        </div>
    </div>

    <!-- CHECKOUT MODAL -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content glass">
            <h2 class="modal-title gradient-text">Checkout</h2>
            <form id="checkoutForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" class="form-control" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="tel" class="form-control" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Delivery Type</label>
                    <select class="form-control" id="deliveryType">
                        <option value="pickup">Pickup</option>
                        <option value="courier">Courier</option>
                    </select>
                </div>

                <div class="form-group hidden" id="addressField">
                    <label>Address</label>
                    <textarea class="form-control" rows="2" placeholder="Street, City, Zip..."></textarea>
                </div>

                <div class="form-group">
                    <label>Payment Type</label>
                    <select class="form-control" required>
                        <option value="card">Card</option>
                        <option value="cash">On delivery</option>
                    </select>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-outline" id="closeCheckoutBtn">Back</button>
                    <button type="submit" class="btn-primary btn-submit">Submit</button>
                </div>
            </form>
        </div>
    </div>

    <!-- SUCCESS SCREEN -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content glass success-content">
            <div class="flame-container">
                <div class="flame"></div>
            </div>
            <div class="success-msg">
                <h3>Order accepted</h3>
                <p>We will gladly prepare your order.</p>
                <p>Expect cosmic impressions.</p>
            </div>
            <button class="btn-primary" style="width:100%" id="closeSuccessBtn">Done</button>
        </div>
    </div>

    <!-- HIDDEN ADMIN BUTTON -->
    <button class="admin-trigger" id="adminTriggerBtn">

            { id: 'el6', line: 'ENERLINE', name: 'Solar Infusion', price: 4.29, imgUrl: 'https://drive.google.com/file/d/1iqqRF9HZqvbI5PPUXbdohg8-77C892IU/view?usp=drivesdk', desc: 'Bright citrus with a light spicy kick.' },
            
            // ENERDUO
            { id: 'ed1', line: 'ENERDUO', name: 'Purple Night Energy', price: 18.90, imgUrl: 'https://drive.google.com/file/d/1wCCRjXfuQ41KHN-LzsDZHHCSMy4KXJel/view?usp=drivesdk', desc: 'Blueberry, grape, desserts, sauces, 2 drinks.' },
            { id: 'ed2', line: 'ENERDUO', name: 'Strawberry Kiss Duo', price: 17.90, imgUrl: 'https://drive.google.com/file/d/12fOj-YEkpm12DCla5wbihi2h2k-ox3dv/view?usp=drivesdk', desc: 'Strawberry, cream, desserts, sauces, 2 drinks.' },
            { id: 'ed3', line: 'ENERDUO', name: 'Tropical Fusion Heat', price: 18.50, imgUrl: 'https://drive.google.com/file/d/1apS_vLbyXLsVLTiSVZf9dvmiiGrsS5hM/view?usp=drivesdk', desc: 'Mango, pineapple, coconut, desserts, sauces, 2 drinks.' },
            { id: 'ed4', line: 'ENERDUO', name: 'Choco Overdose Duo', price: 19.90, imgUrl: 'https://drive.google.com/file/d/1ypKgTV8f6PESZ0OltoKU-AYKRrRf9Pcz/view?usp=drivesdk', desc: 'Chocolate, brownies, creams, sauces, 2 drinks.' },
            { id: 'ed5', line: 'ENERDUO', name: 'Fresh Balance Duo', price: 17.50, imgUrl: 'https://drive.google.com/file/d/1V25uWljm2XoQK2C7IUG1H1snSkkonrPU/view?usp=drivesdk', desc: 'Apple, lemon, fruits, desserts, 2 drinks.' },
            { id: 'ed6', line: 'ENERDUO', name: 'Fire Ice Duo', price: 19.50, imgUrl: 'https://drive.google.com/file/d/1qjj2yPa20wJQP8jTnCyxZf2gvk6Rz4PM/view?usp=drivesdk', desc: 'Citrus, caramel, desserts, sauces, 2 drinks.' }
        ];

        let products = [];
        let cart = [];
        let currentFilter = 'ALL';
        let searchQuery = '';

        /* ==========================================================================
           HELPERS
           ========================================================================== */
        // Convert Google Drive Links to stable thumbnails
        function getImageUrl(url) {
            if (url && url.includes('drive.google.com/file/d/')) {
                const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
                if (match && match[1]) {
                    return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w1200`;
                }
            }
            return url || 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMjIyIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM1NTUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+'; // Fallback
        }

        function formatPrice(price) {
            return parseFloat(price).toFixed(2) + ' $';
        }

        /* ==========================================================================
           INITIALIZATION & RENDER
           ========================================================================== */
        function init() {
            // Load from LocalStorage or use defaults
            const stored = localStorage.getItem('enercos_products');
            if (stored) {
                try {
                    products = JSON.parse(stored);
                } catch(e) {
                    products = [...DEFAULT_PRODUCTS];
                }
            } else {
                products = [...DEFAULT_PRODUCTS];
            }

            renderGrid();
            setupEventListeners();
        }

        function renderGrid() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';

            const filtered = products.filter(p => {
                const matchFilter = currentFilter === 'ALL' || p.line === currentFilter;
                const searchLower = searchQuery.toLowerCase();
                const matchSearch = p.name.toLowerCase().includes(searchLower) || 
                                    p.desc.toLowerCase().includes(searchLower) ||
                                    p.line.toLowerCase().includes(searchLower);
                return matchFilter && matchSearch;
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="no-results">No products found in this quadrant.</div>`;
                return;
            }

            filtered.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card glass';
                card.innerHTML = `
                    <img src="${getImageUrl(p.imgUrl)}" alt="${p.name}" class="product-img" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjMjIyIi8+PHRleHQgeD0iNTAlIiB5PSI1MCUiIGZpbGw9IiM1NTUiIGZvbnQtZmFtaWx5PSJzYW5zLXNlcmlmIiBmb250LXNpemU9IjIwIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkeT0iLjNlbSI+Tm8gSW1hZ2U8L3RleHQ+PC9zdmc+';">
                    <div class="product-line">${p.line}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-desc" title="${p.desc}">${p.desc}</div>
                    <div class="product-footer">
                        <div class="product-price">${formatPrice(p.price)}</div>
                        <button class="btn-add" onclick="addToCart('${p.id}')">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        /* ==========================================================================
           CART LOGIC
           ========================================================================== */
        function addToCart(id) {
            const existing = cart.find(item => item.id === id);
            if (existing) {
                existing.qty++;
            } else {
                const product = products.find(p => p.id === id);
                if (product) cart.push({ ...product, qty: 1 });
            }
            updateCartUI();
            
            // Open cart for feedback
            document.getElementById('cartOverlay').classList.add('open');
        }

        function updateQuantity(id, change) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) {
                    removeFromCart(id);
                } else {
                    updateCartUI();
                }
            }
        }

        function removeFromCart(id) {
            cart = cart.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            // Update Badge
            const totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            document.getElementById('cartBadge').innerText = totalItems;

            // Update Items
            const container = document.getElementById('cartItemsContainer');
            container.innerHTML = '';
            
            if (cart.length === 0) {
                container.innerHTML = `<div class="empty-cart-msg">Your orbit is empty.</div>`;
                document.getElementById('cartTotalPrice').innerText = '$ 0.00';
                return;
            }

            let total = 0;
            cart.forEach(item => {
                total += item.price * item.qty;
                const el = document.createElement('div');
                el.className = 'cart-item';
                el.innerHTML = `
                    <img src="${getImageUrl(item.imgUrl)}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div>
                            <div class="cart-item-title">${item.name}</div>
                            <div class="cart-item-line">${item.line}</div>
                        </div>
                        <div class="cart-item-price">${formatPrice(item.price)}</div>
                    </div>
                    <div class="cart-item-actions" style="display:flex; flex-direction:column; justify-content:space-between; align-items:flex-end;">
                        <button class="btn-remove" onclick="removeFromCart('${item.id}')">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                        <div class="cart-controls">
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">-</button>
                            <span class="qty-count">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                    </div>
                `;
                container.appendChild(el);
            });

            document.getElementById('cartTotalPrice').innerText = formatPrice(total);
        }

        /* ==========================================================================
           EVENT LISTENERS
           ========================================================================== */
        function setupEventListeners() {
            // Filters
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    currentFilter = e.target.getAttribute('data-filter');
                    renderGrid();
                });
            });

            // Search
            document.getElementById('searchInput').addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderGrid();
            });

            // Cart Panel Toggle
            document.getElementById('openCartBtn').addEventListener('click', () => {
                document.getElementById('cartOverlay').classList.add('open');
            });
            document.getElementById('closeCartBtn').addEventListener('click', () => {
                document.getElementById('cartOverlay').classList.remove('open');
            });
            document.getElementById('cartOverlay').addEventListener('click', (e) => {
                if (e.target.id === 'cartOverlay') {
                    document.getElementById('cartOverlay').classList.remove('open');
                }
            });

            // Checkout Toggles
            document.getElementById('checkoutBtn').addEventListener('click', () => {
                if(cart.length === 0) return;
                document.getElementById('cartOverlay').classList.remove('open');
                document.getElementById('checkoutModal').classList.add('open');
            });
            document.getElementById('closeCheckoutBtn').addEventListener('click', () => {
                document.getElementById('checkoutModal').classList.remove('open');
            });
            document.getElementById('checkoutModal').addEventListener('click', (e) => {
                if (e.target.id === 'checkoutModal') {
                    document.getElementById('checkoutModal').classList.remove('open');
                }
            });

            // Delivery Type Logic
            const delType = document.getElementById('deliveryType');
            const addrField = document.getElementById('addressField');
            delType.addEventListener('change', (e) => {
                if (e.target.value === 'courier') {
                    addrField.classList.remove('hidden');
                    addrField.querySelector('textarea').required = true;
                } else {
                    addrField.classList.add('hidden');
                    addrField.querySelector('textarea').required = false;
                }
            });

            // Form Submit -> Success
            document.getElementById('checkoutForm').addEventListener('submit', (e) => {
                e.preventDefault();
                document.getElementById('checkoutModal').classList.remove('open');
                document.getElementById('successModal').classList.add('open');
                cart = [];
                updateCartUI();
                e.target.reset();
                addrField.classList.add('hidden');
            });
            
            // Close Success
            document.getElementById('closeSuccessBtn').addEventListener('click', () => {
                document.getElementById('successModal').classList.remove('open');
            });

            // Admin Logic
            document.getElementById('adminTriggerBtn').addEventListener('click', () => {
                const pin = prompt("Enter Admin PIN:");
                if (pin === "141685") {
                    openAdminPanel();
                } else if (pin !== null) {
                    alert("Access Denied");
                }
            });

            document.getElementById('closeAdminBtn').addEventListener('click', () => {
                document.getElementById('adminModal').classList.remove('open');
            });

            document.getElementById('adminSaveBtn').addEventListener('click', saveAdminChanges);
            document.getElementById('adminResetBtn').addEventListener('click', resetAdminData);
            document.getElementById('adminExportBtn').addEventListener('click', exportJSON);
        }

        /* ==========================================================================
           ADMIN FUNCTIONS
           ========================================================================== */
        function openAdminPanel() {
            const wrapper = document.getElementById('adminTableWrapper');
            wrapper.innerHTML = '<div class="admin-list"></div>';
            const list = wrapper.querySelector('.admin-list');

            products.forEach(p => {
                const item = document.createElement('div');
                item.className = 'admin-item';
                item.dataset.id = p.id;
                
                item.innerHTML = `
                    <img src="${getImageUrl(p.imgUrl)}" class="admin-img-preview" id="preview-${p.id}">
                    <div class="admin-fields">
                        <input type="text" class="adm-name" value="${p.name}" placeholder="Name">
                        <input type="text" class="adm-url" value="${p.imgUrl}" placeholder="Image URL">
                        <input type="number" step="0.01" class="adm-price" value="${p.price}" placeholder="Price">
                        <textarea class="adm-desc" placeholder="Description">${p.desc}</textarea>
                    </div>
                `;
                
                // Live preview update
                const urlInput = item.querySelector('.adm-url');
                const imgPreview = item.querySelector('.admin-img-preview');
                urlInput.addEventListener('input', (e) => {
                    imgPreview.src = getImageUrl(e.target.value);
                });

                list.appendChild(item);
            });

            document.getElementById('adminModal').classList.add('open');
        }

        function saveAdminChanges() {
            const items = document.querySelectorAll('.admin-item');
            items.forEach(item => {
                const id = item.dataset.id;
                const p = products.find(prod => prod.id === id);
                if (p) {
                    p.name = item.querySelector('.adm-name').value;
                    p.imgUrl = item.querySelector('.adm-url').value;
                    p.price = parseFloat(item.querySelector('.adm-price').value) || 0;
                    p.desc = item.querySelector('.adm-desc').value;
                }
            });

            localStorage.setItem('enercos_products', JSON.stringify(products));
            renderGrid();
            updateCartUI(); // Update if items in cart changed details
            document.getElementById('adminModal').classList.remove('open');
            alert('Configuration saved globally.');
        }

        function resetAdminData() {
            if(confirm('Are you sure you want to reset all products to default?')) {
                localStorage.removeItem('enercos_products');
                products = [...DEFAULT_PRODUCTS];
                renderGrid();
                document.getElementById('adminModal').classList.remove('open');
                alert('Data reset to defaults.');
            }
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(products, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href",     dataStr);
            downloadAnchorNode.setAttribute("download", "enercos_config.json");
            document.body.appendChild(downloadAnchorNode); // required for firefox
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // Run
        init();
    </script>
</body>
</html>
